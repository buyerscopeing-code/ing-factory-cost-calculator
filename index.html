<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>공장도착 원가 계산기</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d7deea;--blue:#2563eb;--blue2:#1d4ed8;--red:#dc2626;--green:#15803d;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,'Malgun Gothic',sans-serif}header{background:#fff;color:var(--text);padding:14px 22px;position:sticky;top:0;z-index:20;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(15,23,42,.06)}.brand{display:flex;align-items:center;gap:14px}.brand .logo{height:56px;width:auto;display:block;object-fit:contain}.brand h1{margin:0 0 4px;font-size:24px;color:#111827}.copyright{margin:0;color:#6b7280;font-size:13px}main{max-width:1280px;margin:0 auto;padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{padding:10px 15px;border:1px solid #cfd6e4;border-radius:999px;background:white;cursor:pointer;font-weight:800;touch-action:manipulation}.tab.active{background:var(--blue);color:white;border-color:var(--blue)}.section{display:none}.section.active{display:block}.grid{display:grid;grid-template-columns:1.12fr .88fr;gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(15,23,42,.04)}h2{font-size:18px;margin:0 0 14px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:800}input,select,textarea{width:100%;padding:10px;border:1px solid #cfd6e4;border-radius:10px;font-size:14px;background:white}input[readonly]{background:#f3f4f6}textarea{min-height:70px;resize:vertical}.btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:900;background:#e2e8f0;color:#111827;touch-action:manipulation}.btn.primary{background:var(--blue);color:#fff}.btn.primary:hover{background:var(--blue2)}.btn.danger{background:#fee2e2;color:#991b1b}.btn.green{background:#dcfce7;color:#166534}.btn.small{padding:6px 9px;font-size:12px}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.right{margin-left:auto}.muted{font-size:12px;color:var(--muted)}.sync{display:inline-block;margin-left:8px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:800}.sync.error{background:#fee2e2;color:#991b1b}.item-card{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;background:#fbfdff}.item-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}.item-no{font-weight:900;color:#334155}.result{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.box{background:var(--soft);border:1px solid #e2e8f0;border-radius:12px;padding:12px}.box b{display:block;font-size:12px;color:#64748b;margin-bottom:4px}.box span{font-size:18px;font-weight:900}.box.total{background:#eff6ff;border-color:#bfdbfe}.box.warn{background:#fff7ed;border-color:#fed7aa}.box.green{background:#f0fdf4;border-color:#bbf7d0}table{width:100%;border-collapse:collapse;background:white;font-size:13px}th,td{border-bottom:1px solid #e5e7eb;padding:9px;text-align:left;vertical-align:middle}th{background:#f8fafc;color:#475569;font-size:12px}.num{text-align:right}.nowrap{white-space:nowrap}@media(max-width:1000px){.grid,.row,.row2,.row3{grid-template-columns:1fr}.result{grid-template-columns:1fr}main{padding:10px}header{padding:12px 14px}.brand{align-items:flex-start}.brand .logo{height:48px}.brand h1{font-size:20px}.right{margin-left:0}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="ing_logo.jpg" alt="ING CO., LTD. logo" class="logo">
    <div>
      <h1>공장도착 원가 계산기 <span id="syncStatus" class="sync">Firestore 연결 중</span></h1>
      <div class="copyright">Copyright © ING CO., LTD. All rights reserved.</div>
    </div>
  </div>
</header>
<main>
  <div class="tabs">
    <button type="button" class="tab active" onclick="showTab('calc')">계산기</button>
    <button type="button" class="tab" onclick="showTab('hs')">HS CODE 저장</button>
    <button type="button" class="tab" onclick="showTab('board')">보드 변환</button>
    <button type="button" class="tab" onclick="showTab('quotes')">견적 저장/조회</button>
  </div>

  <section id="calc" class="section active">
    <div class="grid">
      <div>
        <div class="card">
          <h2>견적 기본 정보</h2>
          <div class="row3">
            <div><label>견적일자</label><input id="quoteDate" type="date"></div>
            <div><label>거래처명 / 단가 제출처 *</label><input id="customer" placeholder="예: 상원보드"></div>
            <div><label>견적명 *</label><input id="quoteTitle" placeholder="예: 서랍장 2차"></div>
          </div>
          <div><label>비고 *</label><textarea id="memo" placeholder="인코텀즈 조건, 도착지 정보 및 특이사항 입력"></textarea></div>
        </div>

        <div class="card">
          <div class="actions" style="margin-bottom:12px">
            <h2 style="margin:0">제품 정보</h2>
            <button type="button" class="btn primary right" onclick="addItem()">+ 제품 정보 추가</button>
          </div>
          <div id="itemsArea"></div>
          <div class="actions" style="margin-top:8px">
            <button type="button" class="btn" onclick="calcAll()">다시 계산</button>
          </div>
        </div>

        <div class="card">
          <h2>수입비용 입력</h2>
          <div class="row">
            <div><label>중국 내륙운송료 KRW</label><input id="chinaInland" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>해운비 KRW</label><input id="oceanFreight" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>통관부대비 KRW</label><input id="customsFee" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>국내 내륙운송료 KRW</label><input id="domesticFreight" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
          </div>
          <div class="row">
            <div><label>마진율 / 커미션 %</label><input id="marginRate" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>부가세율 %</label><input id="vatRate" type="text" inputmode="decimal" value="10" oninput="formatNumInput(this);calcAll()"></div>
            <div></div><div></div>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>계산 결과</h2>
          <div class="result">
            <div class="box warn"><b>관세</b><span id="rDuty">0</span></div>
            <div class="box"><b>수입 비용</b><span id="rImportCost">0</span></div>
            <div class="box green"><b>커미션</b><span id="rCommission">0</span></div>
            <div class="box"><b>공급가액</b><span id="rSupply">0</span></div>
            <div class="box"><b>세액</b><span id="rVat">0</span></div>
            <div class="box total"><b>총 공장도착가</b><span id="rTotal">0</span></div>
          </div>
          <div class="actions" style="margin-top:14px">
            <button type="button" class="btn primary" onclick="saveQuote()">견적 저장</button>
            <button type="button" class="btn" onclick="resetCalc()">새 견적</button>
          </div>
        </div>

        <div class="card">
          <h2>아이템별 부가세 포함 단가</h2>
          <div style="overflow:auto">
            <table id="itemResult"><thead><tr><th>아이템</th><th>수량</th><th>단위</th><th class="num">제품금액</th><th class="num">부가세포함 총액</th><th class="num">부가세포함 단가</th></tr></thead><tbody></tbody></table>
          </div>
        </div>

        <div class="card">
          <h2>PDF 내보내기 조건</h2>
          <div class="row2">
            <div><label>계약금 %</label><input id="depositPercent" type="text" inputmode="decimal" value="30" oninput="formatNumInput(this);calcAll()"></div>
