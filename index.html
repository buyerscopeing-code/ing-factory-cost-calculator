<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>공장도착 원가 계산기</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#d7deea;--blue:#2563eb;--blue2:#1d4ed8;--red:#dc2626;--green:#15803d;--amber:#b45309;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,'Malgun Gothic',sans-serif}header{background:#ffffff;color:var(--text);padding:14px 22px;position:sticky;top:0;z-index:20;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 4px rgba(15,23,42,.06)}.brand{display:flex;align-items:center;gap:14px}.brand .logo{height:56px;width:auto;display:block;object-fit:contain;background:transparent;border-radius:0;padding:0}.brand h1{margin:0 0 4px;font-size:24px;color:#111827}.copyright{margin:0;color:#6b7280;font-size:13px}main{max-width:1280px;margin:0 auto;padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{padding:10px 15px;border:1px solid #cfd6e4;border-radius:999px;background:white;cursor:pointer;font-weight:800}.tab.active{background:var(--blue);color:white;border-color:var(--blue)}.section{display:none}.section.active{display:block}.grid{display:grid;grid-template-columns:1.12fr .88fr;gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(15,23,42,.04)}h2{font-size:18px;margin:0 0 14px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}.row2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:800}input,select,textarea{width:100%;padding:10px;border:1px solid #cfd6e4;border-radius:10px;font-size:14px;background:white}input[readonly]{background:#f3f4f6}textarea{min-height:70px;resize:vertical}.btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:900;background:#e2e8f0;color:#111827}.btn.primary{background:var(--blue);color:#fff}.btn.primary:hover{background:var(--blue2)}.btn.danger{background:#fee2e2;color:#991b1b}.btn.green{background:#dcfce7;color:#166534}.btn.small{padding:6px 9px;font-size:12px}.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.right{margin-left:auto}.muted{font-size:12px;color:var(--muted)}.item-card{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;background:#fbfdff}.item-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}.item-no{font-weight:900;color:#334155}.result{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.box{background:var(--soft);border:1px solid #e2e8f0;border-radius:12px;padding:12px}.box b{display:block;font-size:12px;color:#64748b;margin-bottom:4px}.box span{font-size:18px;font-weight:900}.box.total{background:#eff6ff;border-color:#bfdbfe}.box.warn{background:#fff7ed;border-color:#fed7aa}.box.green{background:#f0fdf4;border-color:#bbf7d0}table{width:100%;border-collapse:collapse;background:white;font-size:13px}th,td{border-bottom:1px solid #e5e7eb;padding:9px;text-align:left;vertical-align:middle}th{background:#f8fafc;color:#475569;font-size:12px}.num{text-align:right}.nowrap{white-space:nowrap}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800}.divider{height:1px;background:#e5e7eb;margin:14px 0}@media(max-width:1000px){.grid,.row,.row2,.row3{grid-template-columns:1fr}.result{grid-template-columns:1fr}main{padding:10px}header{padding:12px 14px}.brand{align-items:flex-start}.brand .logo{height:48px}.brand h1{font-size:20px}.right{margin-left:0}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img src="ing_logo.jpg" alt="ING CO., LTD. logo" class="logo">
    <div>
      <h1>공장도착 원가 계산기</h1>
      <div class="copyright">Copyright © ING CO., LTD. All rights reserved.</div>
    </div>
  </div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('calc')">계산기</button>
    <button class="tab" onclick="showTab('hs')">HS CODE 저장</button>
    <button class="tab" onclick="showTab('board')">보드 변환</button>
    <button class="tab" onclick="showTab('quotes')">견적 저장/조회</button>
  </div>

  <section id="calc" class="section active">
    <div class="grid">
      <div>
        <div class="card">
          <h2>견적 기본 정보</h2>
          <div class="row3">
            <div><label>견적일자</label><input id="quoteDate" type="date"></div>
            <div><label>거래처명 / 단가 제출처 *</label><input id="customer" placeholder="예: 상원보드"></div>
            <div><label>견적명 *</label><input id="quoteTitle" placeholder="예: 서랍장 2차"></div>
          </div>
          <div><label>비고 *</label><textarea id="memo" placeholder="인코텀즈 조건, 도착지 정보 및 특이사항 입력"></textarea></div>
        </div>

        <div class="card">
          <div class="actions" style="margin-bottom:12px">
            <h2 style="margin:0">제품 정보</h2>
            <button class="btn primary right" onclick="addItem()">+ 제품 정보 추가</button>
          </div>
          <div id="itemsArea"></div>
          <div class="actions" style="margin-top:8px">
            <button class="btn" onclick="calcAll()">다시 계산</button>
          </div>
        </div>

        <div class="card">
          <h2>수입비용 입력</h2>
          <div class="row">
            <div><label>중국 내륙운송료 KRW</label><input id="chinaInland" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>해운비 KRW</label><input id="oceanFreight" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>통관부대비 KRW</label><input id="customsFee" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>국내 내륙운송료 KRW</label><input id="domesticFreight" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
          </div>
          <div class="row">
            <div><label>마진율 / 커미션 %</label><input id="marginRate" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>부가세율 %</label><input id="vatRate" type="text" inputmode="decimal" value="10" oninput="formatNumInput(this);calcAll()"></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>계산 결과</h2>
          <div class="result">
            <div class="box warn"><b>관세</b><span id="rDuty">0</span></div>
            <div class="box"><b>수입 비용</b><span id="rImportCost">0</span></div>
            <div class="box green"><b>커미션</b><span id="rCommission">0</span></div>
            <div class="box"><b>공급가액</b><span id="rSupply">0</span></div>
            <div class="box"><b>세액</b><span id="rVat">0</span></div>
            <div class="box total"><b>총 공장도착가</b><span id="rTotal">0</span></div>
          </div>
          <div class="actions" style="margin-top:14px">
            <button class="btn primary" onclick="saveQuote()">견적 저장</button>
            <button class="btn" onclick="resetCalc()">새 견적</button>
          </div>
        </div>

        <div class="card">
          <h2>아이템별 부가세 포함 단가</h2>
          <div style="overflow:auto">
            <table id="itemResult"><thead><tr><th>아이템</th><th>수량</th><th>단위</th><th class="num">제품금액</th><th class="num">부가세포함 총액</th><th class="num">부가세포함 단가</th></tr></thead><tbody></tbody></table>
          </div>
        </div>

        <div class="card">
          <h2>PDF 내보내기 조건</h2>
          <div class="row2">
            <div><label>계약금 %</label><input id="depositPercent" type="text" inputmode="decimal" value="30" oninput="formatNumInput(this);calcAll()"></div>
            <div><label>계약금 금액 KRW</label><input id="depositAmount" readonly value="0"></div>
          </div>
          <div class="row2">
            <div><label>계약금 비고</label><input id="depositMemo" placeholder="예: 발주 시 입금"></div>
            <div><label>잔금 %</label><input id="balancePercent" type="text" inputmode="decimal" value="70" oninput="formatNumInput(this);calcAll()"></div>
          </div>
          <div class="row2">
            <div><label>잔금 금액 KRW</label><input id="balanceAmount" readonly value="0"></div>
            <div><label>잔금 비고</label><input id="balanceMemo" placeholder="예: 출고 전 입금"></div>
          </div>
          <button class="btn primary" onclick="exportPdf()">계산 결과 PDF 내보내기</button>
        </div>
      </div>
    </div>
  </section>

  <section id="hs" class="section">
    <div class="card">
      <h2>HS CODE / 아이템명 / 관세율 저장</h2>
      <div class="row">
        <div><label>HS CODE</label><input id="hsCode" placeholder="예: 540233"></div>
        <div><label>아이템명</label><input id="hsItemName" placeholder="예: 폴리에스터 DTY"></div>
        <div><label>원산지/메모</label><input id="hsOrigin" placeholder="예: 중국"></div>
        <div><label>관세율 %</label><input id="hsDutyRate" type="text" inputmode="decimal" oninput="formatNumInput(this)" placeholder="예: 8"></div>
      </div>
      <div class="actions"><button class="btn primary" onclick="saveHs()">HS 저장</button><button class="btn" onclick="clearHsForm()">입력 초기화</button></div>
    </div>
    <div class="card">
      <h2>HS CODE 조회</h2>
      <div class="row3">
        <div><label>검색어</label><input id="hsSearch" placeholder="HS CODE 또는 아이템명" oninput="renderHs()"></div>
        <div><label>검색 방식</label><select id="hsSearchMode" onchange="renderHs()"><option value="contains">포함검색</option><option value="exact">정확일치</option></select></div>
        <div><label>&nbsp;</label><button class="btn" onclick="renderHs()">조회</button></div>
      </div>
      <div style="overflow:auto"><table id="hsTable"><thead><tr><th>HS CODE</th><th>아이템명</th><th>원산지/메모</th><th>관세율</th><th>관리</th></tr></thead><tbody></tbody></table></div>
    </div>
  </section>

  <section id="board" class="section">
    <div class="card">
      <h2>보드 변환</h2>
      <div class="row">
        <div><label>가로 mm</label><input id="bdW" type="text" inputmode="decimal" value="1,220" oninput="formatNumInput(this);calcBoard()"></div>
        <div><label>세로 mm</label><input id="bdH" type="text" inputmode="decimal" value="2,440" oninput="formatNumInput(this);calcBoard()"></div>
        <div><label>두께 mm</label><input id="bdT" type="text" inputmode="decimal" value="18" oninput="formatNumInput(this);calcBoard()"></div>
        <div><label>1장 CBM</label><input id="bdCbm" readonly></div>
      </div>
      <div class="row2">
        <div><label>m³ 단가 입력</label><input id="bdM3Price" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcBoard()"></div>
        <div><label>장당 단가 결과</label><input id="bdSheetPrice" readonly></div>
      </div>
      <div class="row2">
        <div><label>장당 단가 입력</label><input id="bdSheetInput" type="text" inputmode="decimal" value="0" oninput="formatNumInput(this);calcBoard()"></div>
        <div><label>m³ 단가 결과</label><input id="bdM3Result" readonly></div>
      </div>
    </div>
  </section>

  <section id="quotes" class="section">
    <div class="card">
      <h2>견적 저장 / 날짜별 조회 / 검색</h2>
      <div class="row">
        <div><label>시작일</label><input id="qFrom" type="date" onchange="renderQuotes()"></div>
        <div><label>종료일</label><input id="qTo" type="date" onchange="renderQuotes()"></div>
        <div><label>검색 대상</label><select id="qTarget" onchange="renderQuotes()"><option value="all" selected>전체</option><option value="customer">거래처명</option><option value="item">아이템명</option><option value="memo">비고</option></select></div>
        <div><label>검색 방식</label><select id="qMode" onchange="renderQuotes()"><option value="contains" selected>포함검색</option><option value="exact">정확일치</option></select></div>
      </div>
      <div class="row3">
        <div><label>검색어</label><input id="qSearch" placeholder="검색어" oninput="renderQuotes()"></div>
        <div><label>정렬</label><select id="qSort" onchange="renderQuotes()"><option value="new">최신순</option><option value="old">오래된순</option><option value="customer">거래처명순</option><option value="total">금액 큰순</option></select></div>
        <div><label>&nbsp;</label><div class="actions"><button class="btn" onclick="exportQuotes()">CSV 내보내기</button><button class="btn danger" onclick="clearAllQuotes()">전체 삭제</button></div></div>
      </div>
      <div style="overflow:auto"><table id="quotesTable"><thead><tr><th>날짜</th><th>거래처명</th><th>견적명</th><th>아이템</th><th class="num">총액</th><th>관리</th></tr></thead><tbody></tbody></table></div>
    </div>
  </section>
</main>
<script>
const $ = id => document.getElementById(id);
const money = n => Math.round(Number(n)||0).toLocaleString('ko-KR');
const uncomma = v => String(v ?? '').replace(/,/g,'').trim();
const num = v => Number(uncomma(typeof v === 'object' && v ? v.value : v)) || 0;
function fmtNum(v){
  v = String(v ?? '').replace(/,/g,'').replace(/[^0-9.\-]/g,'');
  const neg = v.startsWith('-') ? '-' : '';
  v = v.replace(/-/g,'');
  const parts = v.split('.');
  let intp = parts[0] || '';
  let dec = parts.length > 1 ? '.' + parts.slice(1).join('') : '';
  intp = intp.replace(/^0+(?=\d)/,'');
  const withComma = intp ? Number(intp).toLocaleString('ko-KR') : '';
  return neg + withComma + dec;
}
function formatNumInput(el){ el.value = fmtNum(el.value); }
function fmtInput(n){ return fmtNum(String(n ?? 0)); }
const cleanHs = s => String(s||'').replace(/[^0-9]/g,'');
const esc = s => String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
let editQuoteId = null;
let itemSeq = 0;

function showTab(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${id}')"]`).classList.add('active');
  $(id).classList.add('active');
  if(id==='hs') renderHs();
  if(id==='quotes') renderQuotes();
  if(id==='board') calcBoard();
}
function getHsList(){try{return JSON.parse(localStorage.getItem('hsList_v4')||localStorage.getItem('hsList')||'[]')}catch(e){return []}}
function setHsList(v){localStorage.setItem('hsList_v4',JSON.stringify(v))}
function getQuotes(){try{return JSON.parse(localStorage.getItem('quotes_v4')||localStorage.getItem('quotes')||'[]')}catch(e){return []}}
function setQuotes(v){localStorage.setItem('quotes_v4',JSON.stringify(v))}
function initDefaults(){
  if(!localStorage.getItem('hsList_v4')) setHsList([{code:'540233',itemName:'폴리에스터 DTY / 합성필라멘트사',origin:'중국',dutyRate:8,createdAt:new Date().toISOString()}]);
  $('quoteDate').value = new Date().toISOString().slice(0,10);
}
function addItem(data={}){
  itemSeq += 1;
  const div=document.createElement('div');
  div.className='item-card';
  div.dataset.itemId=String(Date.now())+String(itemSeq);
  div.innerHTML=`
    <div class="item-head"><span class="item-no">제품 ${itemSeq}</span><button class="btn danger small right" onclick="this.closest('.item-card').remove();renumberItems();calcAll()">삭제</button></div>
    <div class="row">
      <div><label>아이템명 *</label><input class="itemName" value="${esc(data.itemName||'')}" placeholder="아이템명" oninput="calcAll()"></div>
      <div><label>통화</label><select class="cur" onchange="calcAll()"><option>KRW</option><option>USD</option><option>RMB</option><option>JPY</option><option>EUR</option></select></div>
      <div><label>단위</label><select class="unitSelect" onchange="toggleCustomUnit(this);calcAll()"><option>개</option><option>장</option><option>세트</option><option>박스</option><option>kg</option><option>ton</option><option>m</option><option>yd</option><option>㎡</option><option>m³</option><option>롤</option><option>컨테이너</option><option>직접입력</option></select><input class="unitCustom" style="display:none;margin-top:6px" placeholder="단위 직접 입력" oninput="calcAll()"></div>
      <div><label>관세율 %</label><input class="dutyRate" type="text" inputmode="decimal" value="${fmtInput(data.dutyRate ?? 0)}" oninput="formatNumInput(this);calcAll()"></div>
    </div>
    <div class="row">
      <div><label>단가 *</label><input class="price" type="text" inputmode="decimal" value="${fmtInput(data.price ?? 0)}" oninput="formatNumInput(this);calcAll()"></div>
      <div><label>수량 *</label><input class="qty" type="text" inputmode="decimal" value="${fmtInput(data.qty ?? 0)}" oninput="formatNumInput(this);calcAll()"></div>
      <div><label>환율 *</label><input class="exchangeRate" type="text" inputmode="decimal" value="${fmtInput(data.exchangeRate ?? data.baseRate ?? 1)}" oninput="formatNumInput(this);calcAll()"></div>
      <div><label>제품금액 KRW</label><input class="amount" readonly value="0"></div>
    </div>`;
  $('itemsArea').appendChild(div);
  div.querySelector('.cur').value=data.cur||'KRW';
  setUnitValue(div, data.unit||'개');
  calcAll();
}
function unitOptions(){return ['개','장','세트','박스','kg','ton','m','yd','㎡','m³','롤','컨테이너'];}
function toggleCustomUnit(sel){
  const input=sel.parentElement.querySelector('.unitCustom');
  if(!input) return;
  input.style.display = sel.value==='직접입력' ? 'block' : 'none';
  if(sel.value!=='직접입력') input.value='';
}
function setUnitValue(card, value){
  const sel=card.querySelector('.unitSelect');
  const input=card.querySelector('.unitCustom');
  const v=String(value||'개');
  if(unitOptions().includes(v)){ sel.value=v; if(input){input.value=''; input.style.display='none';} }
  else { sel.value='직접입력'; if(input){input.value=v; input.style.display='block';} }
}
function getUnitValue(card){
  const sel=card.querySelector('.unitSelect');
  const input=card.querySelector('.unitCustom');
  if(sel && sel.value==='직접입력') return (input?.value||'').trim() || '직접입력';
  return sel ? sel.value : '';
}
function renumberItems(){document.querySelectorAll('.item-card .item-no').forEach((el,i)=>el.textContent='제품 '+(i+1));}
function itemCards(){return [...document.querySelectorAll('#itemsArea .item-card')];}
function getAppliedRate(card){
  const cur=card.querySelector('.cur').value;
  if(cur==='KRW') return 1;
  return num(card.querySelector('.exchangeRate'))||1;
}
function collectItems(){
  return itemCards().map(card=>{
    const rate=getAppliedRate(card);
    const price=num(card.querySelector('.price'));
    const qty=num(card.querySelector('.qty'));
    const amount=price*qty*rate;
    return {
      itemName:card.querySelector('.itemName').value.trim(),
      cur:card.querySelector('.cur').value,
      unit:getUnitValue(card),
      price,qty,
      exchangeRate:rate,
      appliedRate:rate,
      dutyRate:num(card.querySelector('.dutyRate')),
      amount
    };
  });
}
function calcAll(){
  const items=collectItems();
  const product=items.reduce((a,b)=>a+b.amount,0);
  const totalQty=items.reduce((a,b)=>a+(Number(b.qty)||0),0);
  const china=num($('chinaInland'));
  const ocean=num($('oceanFreight'));
  const customsFee=num($('customsFee'));
  const domestic=num($('domesticFreight'));
  const marginRate=(num($('marginRate')))/100;
  const vatRate=(num($('vatRate')))/100;

  // 관세 과세 기준: 제품금액대 + 해운비 + 중국 내륙운송료
  const taxable=product+ocean+china;
  const duty=items.reduce((sum,it)=>{
    const share=product ? it.amount/product : 0;
    const itemTaxable=taxable*share;
    return sum + itemTaxable*((Number(it.dutyRate)||0)/100);
  },0);

  // 커미션: (제품금액대 + 해운비 + 중국 내륙운송료) × 마진율
  const commission=(product+ocean+china)*marginRate;

  // 수입 비용: 해운비 + 중국 내륙운송료 + 국내 내륙운송료 + 통관부대비
  const importCost=ocean+china+domestic+customsFee;

  // 공급가액: 제품총금액 + 해운비 + 중국내륙운송료 + 관세 + 국내내륙운송료 + 통관부대비 + 커미션
  const supply=product+ocean+china+duty+domestic+customsFee+commission;
  const vat=supply*vatRate;
  const total=supply+vat;
  const depositAmount=total*((num($('depositPercent'))||0)/100);
  const balanceAmount=total*((num($('balancePercent'))||0)/100);
  if($('depositAmount')) $('depositAmount').value=money(depositAmount);
  if($('balanceAmount')) $('balanceAmount').value=money(balanceAmount);

  itemCards().forEach((card,i)=>{
    const it=items[i];
    card.querySelector('.amount').value=money(it.amount);
  });
  $('rDuty').textContent=money(duty);
  $('rImportCost').textContent=money(importCost);
  $('rCommission').textContent=money(commission);
  $('rSupply').textContent=money(supply);
  $('rVat').textContent=money(vat);
  $('rTotal').textContent=money(total);

  const rb=$('itemResult').querySelector('tbody');
  rb.innerHTML='';
  items.forEach(it=>{
    const share=product ? it.amount/product : 0;
    const itemTotal=it.amount + (total-product)*share;
    const vatUnit=(Number(it.qty)||0) ? itemTotal/(Number(it.qty)||1) : 0;
    it.vatIncludedTotal=itemTotal;
    it.vatIncludedUnit=vatUnit;
    rb.insertAdjacentHTML('beforeend',`<tr><td>${esc(it.itemName||'-')}</td><td>${fmtInput(it.qty)}</td><td>${esc(it.unit||'')}</td><td class="num">${money(it.amount)}</td><td class="num">${money(itemTotal)}</td><td class="num">${money(vatUnit)}</td></tr>`);
  });
  return {items,product,taxable,duty,importCost,commission,supply,vat,total,totalQty,china,ocean,customsFee,domestic,marginRate:marginRate*100,vatRate:vatRate*100,depositPercent:num($('depositPercent')),depositAmount,balancePercent:num($('balancePercent')),balanceAmount};
}
function validateRequired(actionName){
  const missing=[];
  if(!$('customer').value.trim()) missing.push('거래처명');
  if(!$('quoteTitle').value.trim()) missing.push('견적명');
  if(!$('memo').value.trim()) missing.push('비고');
  const cards=itemCards();
  if(!cards.length) missing.push('제품 정보');
  cards.forEach((card,i)=>{
    const no=i+1;
    if(!card.querySelector('.itemName').value.trim()) missing.push(`제품 ${no} 아이템명`);
    if(uncomma(card.querySelector('.price').value)==='' || num(card.querySelector('.price'))<=0) missing.push(`제품 ${no} 단가`);
    if(uncomma(card.querySelector('.qty').value)==='' || num(card.querySelector('.qty'))<=0) missing.push(`제품 ${no} 수량`);
    if(uncomma(card.querySelector('.exchangeRate').value)==='' || num(card.querySelector('.exchangeRate'))<=0) missing.push(`제품 ${no} 환율`);
  });
  if(missing.length){ alert(`${actionName}할 수 없습니다. 필수 기재 항목을 입력해주세요.\n- `+missing.join('\n- ')); return false; }
  return true;
}

function saveQuote(){
  if(!validateRequired('견적 저장')) return;
  const r=calcAll();
  const quote={id:editQuoteId||Date.now().toString(),date:$('quoteDate').value||new Date().toISOString().slice(0,10),customer:$('customer').value.trim(),title:$('quoteTitle').value.trim(),memo:$('memo').value.trim(),costs:{chinaInland:uncomma($('chinaInland').value),oceanFreight:uncomma($('oceanFreight').value),marginRate:uncomma($('marginRate').value),customsFee:uncomma($('customsFee').value),domesticFreight:uncomma($('domesticFreight').value),vatRate:uncomma($('vatRate').value)},payment:{depositPercent:uncomma($('depositPercent').value),depositAmount:Math.round(r.depositAmount),depositMemo:$('depositMemo').value.trim(),balancePercent:uncomma($('balancePercent').value),balanceAmount:Math.round(r.balanceAmount),balanceMemo:$('balanceMemo').value.trim()},items:r.items,summary:r,updatedAt:new Date().toISOString()};
  let qs=getQuotes();
  if(editQuoteId){qs=qs.map(q=>q.id===editQuoteId?quote:q);editQuoteId=null;alert('견적을 수정 저장했습니다.');}
  else{qs.unshift(quote);alert('견적을 저장했습니다.');}
  setQuotes(qs);renderQuotes();
}
function loadQuote(id){
  const q=getQuotes().find(x=>x.id===id);if(!q)return;
  editQuoteId=id;
  $('quoteDate').value=q.date||new Date().toISOString().slice(0,10);
  $('customer').value=q.customer||'';$('quoteTitle').value=q.title||'';$('memo').value=q.memo||'';
  const c=q.costs||{};
  ['chinaInland','oceanFreight','marginRate','customsFee','domesticFreight','vatRate'].forEach(k=>{if($(k)&&c[k]!==undefined)$(k).value=fmtInput(c[k])});
  const pay=q.payment||{};
  if(pay.depositPercent!==undefined)$('depositPercent').value=fmtInput(pay.depositPercent);
  if(pay.depositMemo!==undefined)$('depositMemo').value=pay.depositMemo;
  if(pay.balancePercent!==undefined)$('balancePercent').value=fmtInput(pay.balancePercent);
  if(pay.balanceMemo!==undefined)$('balanceMemo').value=pay.balanceMemo;
  $('itemsArea').innerHTML='';itemSeq=0;(q.items||[]).forEach(addItem);if(!(q.items||[]).length)addItem();
  showTab('calc');calcAll();
}
function delQuote(id){if(confirm('이 견적을 삭제할까요?')){setQuotes(getQuotes().filter(q=>q.id!==id));renderQuotes();}}
function resetCalc(){
  editQuoteId=null;$('quoteDate').value=new Date().toISOString().slice(0,10);$('customer').value='';$('quoteTitle').value='';$('memo').value='';
  ['chinaInland','oceanFreight','marginRate','customsFee','domesticFreight'].forEach(id=>$(id).value=0);
  $('vatRate').value=10; $('depositPercent').value='30'; $('depositMemo').value=''; $('balancePercent').value='70'; $('balanceMemo').value='';
  $('itemsArea').innerHTML='';itemSeq=0;addItem();calcAll();
}
function matchText(text,kw,mode){text=String(text||'').toLowerCase().trim();kw=String(kw||'').toLowerCase().trim();if(!kw)return true;return mode==='exact'?text===kw:text.includes(kw);}
function renderQuotes(){
  const from=$('qFrom').value,to=$('qTo').value,target=$('qTarget').value,mode=$('qMode').value,kw=$('qSearch').value;
  let qs=getQuotes().filter(q=>{
    if(from&&q.date<from)return false;if(to&&q.date>to)return false;
    const itemNames=(q.items||[]).map(i=>i.itemName).join(' ');
    if(target==='customer')return matchText(q.customer,kw,mode);
    if(target==='item')return matchText(itemNames,kw,mode);
    if(target==='memo')return matchText(q.memo,kw,mode);
    return matchText([q.customer,q.title,itemNames,q.memo].join(' '),kw,mode);
  });
  const sort=$('qSort').value;
  if(sort==='new')qs.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  if(sort==='old')qs.sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  if(sort==='customer')qs.sort((a,b)=>String(a.customer).localeCompare(String(b.customer),'ko'));
  if(sort==='total')qs.sort((a,b)=>(b.summary?.total||0)-(a.summary?.total||0));
  const tb=$('quotesTable').querySelector('tbody');tb.innerHTML='';
  qs.forEach(q=>{const itemNames=(q.items||[]).map(i=>i.itemName||'-').join(', ');tb.insertAdjacentHTML('beforeend',`<tr><td>${esc(q.date)}</td><td>${esc(q.customer||'-')}</td><td>${esc(q.title||'-')}</td><td>${esc(itemNames)}</td><td class="num">${money(q.summary?.total||0)}</td><td class="nowrap"><button class="btn small" onclick="loadQuote('${q.id}')">수정</button> <button class="btn danger small" onclick="delQuote('${q.id}')">삭제</button></td></tr>`)});
}
function exportQuotes(){
  const rows=[['날짜','거래처명','견적명','아이템명','총액','비고']];
  getQuotes().forEach(q=>rows.push([q.date,q.customer,q.title,(q.items||[]).map(i=>i.itemName).join('|'),Math.round(q.summary?.total||0),q.memo]));
  const csv='\ufeff'+rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='견적저장.csv';a.click();
}
function clearAllQuotes(){if(confirm('저장된 견적을 모두 삭제할까요?')){setQuotes([]);renderQuotes();}}
function saveHs(){
  const code=cleanHs($('hsCode').value);if(!code){alert('HS CODE를 입력해주세요.');return;}
  const h={code,itemName:$('hsItemName').value.trim(),origin:$('hsOrigin').value.trim(),dutyRate:num($('hsDutyRate')),createdAt:new Date().toISOString()};
  let list=getHsList();const idx=list.findIndex(x=>cleanHs(x.code)===code);if(idx>=0)list[idx]=h;else list.unshift(h);setHsList(list);clearHsForm();renderHs();
}
function clearHsForm(){$('hsCode').value='';$('hsItemName').value='';$('hsOrigin').value='';$('hsDutyRate').value='';}
function editHs(code){const h=getHsList().find(x=>cleanHs(x.code)===cleanHs(code));if(!h)return;$('hsCode').value=h.code;$('hsItemName').value=h.itemName;$('hsOrigin').value=h.origin;$('hsDutyRate').value=fmtInput(h.dutyRate);}
function delHs(code){if(confirm('삭제할까요?')){setHsList(getHsList().filter(x=>cleanHs(x.code)!==cleanHs(code)));renderHs();}}
function renderHs(){
  const kw=$('hsSearch').value.trim();const mode=$('hsSearchMode').value;const tb=$('hsTable').querySelector('tbody');tb.innerHTML='';
  let list=getHsList().filter(h=>{if(!kw)return true;const hs=cleanHs(kw);if(hs)return mode==='exact'?cleanHs(h.code)===hs:cleanHs(h.code).includes(hs);return matchText([h.itemName,h.origin].join(' '),kw,mode);});
  list.forEach(h=>tb.insertAdjacentHTML('beforeend',`<tr><td>${esc(h.code)}</td><td>${esc(h.itemName||'-')}</td><td>${esc(h.origin||'-')}</td><td>${h.dutyRate}%</td><td class="nowrap"><button class="btn small" onclick="editHs('${h.code}')">수정</button> <button class="btn danger small" onclick="delHs('${h.code}')">삭제</button></td></tr>`));
}

function calcBoard(){
  const w=num($('bdW')),h=num($('bdH')),t=num($('bdT'));
  const cbm=w/1000*h/1000*t/1000;$('bdCbm').value=cbm?cbm.toFixed(6):'';

  $('bdM3Result').value=cbm?Number((sheet/cbm).toFixed(2)).toLocaleString('ko-KR'):'';
}
